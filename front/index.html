<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>YouTube Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex flex-col items-center p-10">

  <h1 class="text-3xl font-bold mb-6">Buscador YouTube</h1>

  <div class="w-full max-w-2xl flex gap-2">
    <input id="searchInput"
      class="w-full p-3 rounded text-black"
      placeholder="Buscar videos..." />

    <button onclick="searchVideos()"
      class="bg-red-600 px-4 py-2 rounded">
      Buscar
    </button>
  </div>

  <div id="results" class="grid gap-4 mt-8 w-full max-w-4xl"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>

</body>
</html>
